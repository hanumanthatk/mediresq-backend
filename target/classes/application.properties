# =====================================================
# Smart Emergency Medical Response System - Config
# =====================================================

# =====================================================
# SERVER CONFIGURATION
# =====================================================

server.port=8080
server.servlet.context-path=/api

# =====================================================
# APPLICATION
# =====================================================

spring.application.name=smart-emergency-system

# =====================================================
# DATABASE CONFIGURATION (Render MySQL)
# =====================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# HIKARI CONNECTION POOL
# =====================================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

logging.level.org.hibernate.SQL=DEBUG

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# =====================================================
# JWT CONFIGURATION
# =====================================================

app.jwt.secret=SmartEmergencySystemSuperSecretKeyForJWTTokenGeneration2024ProductionKey
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# =====================================================
# EMAIL CONFIGURATION
# =====================================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =====================================================
# GOOGLE MAPS API
# =====================================================

app.google.maps.api-key=YOUR_GOOGLE_MAPS_API_KEY

# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# LOGGING CONFIGURATION
# =====================================================

logging.level.com.smartemergency=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# =====================================================
# ACTUATOR CONFIGURATION
# =====================================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always