# =====================================================
# Smart Emergency Medical Response System - Config
# =====================================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=smart-emergency-system

# =====================================================
# DATABASE CONFIGURATION (MySQL)
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_emergency_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# =====================================================
# JWT CONFIGURATION
# =====================================================
app.jwt.secret=SmartEmergencySystemSuperSecretKeyForJWTTokenGeneration2024ProductionKey
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# =====================================================
# EMAIL CONFIGURATION (Gmail SMTP)
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =====================================================
# GOOGLE MAPS API
# =====================================================
app.google.maps.api-key=YOUR_GOOGLE_MAPS_API_KEY

# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.com.smartemergency=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# =====================================================
# ACTUATOR (for monitoring)
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
